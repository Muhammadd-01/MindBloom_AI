name: mindbloom_ai
description: "MindBloom AI - Nurture your mind, grow your positivity with AI-powered behavioral insights"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Charts
  http: ^1.2.2
  fl_chart: ^0.70.2
  flutter_dotenv: ^5.1.0
  
  # UI/UX
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.3
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # UUID
  uuid: ^4.5.1
  
  # Firebase
  firebase_core: ^3.11.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  google_sign_in: ^6.2.2
  
  # Intl
  intl: ^0.20.2
  supabase_flutter: ^2.12.2
  image_picker: ^1.2.1
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1
  local_auth: ^3.0.1
  pin_code_fields: ^9.3.0
  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env
